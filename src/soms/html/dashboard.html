<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="dashboard.css">
    <title>Document</title>
</head>
<body>
<div class="container mt-4">

    <h4 class="mb-5 text-center">Welcome to your Dashboard</h4>

    <!-- Cards -->
    <div class="row text-center">

        <div class="col-md-4">
            <div class="card p-3 shadow-sm">
                <h5>Total Orders</h5>
                <h4 id="totalOrders">0</h4>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card p-3 shadow-sm">
                <h5>Pending Shipments</h5>
                <h4 id="pendingOrders">0</h4>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card p-3 shadow-sm">
                <h5>Revenue</h5>
                <h4>$45,000</h4>
            </div>
        </div>

    </div>

    <!-- Buttons -->
    <div class="text-center my-5">
        <button class="btn btn-primary me-5" onclick="showOrders('pending')">Show Pending</button>
        <button class="btn btn-primary me-5" onclick="showOrders('shipped')">Show Shipped</button>
        <button class="btn btn-primary" onclick="showOrders('all')">Show All</button>
    </div>

    <!-- Orders List -->
    <div id="ordersList" class="list-group"></div>

</div>
<script src="dashboard.js"></script>
</body>
</html>
