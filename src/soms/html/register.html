<body>

<header>
    <h1>Sales Order Management System</h1>
</header>

<nav >

    <ul>

        <li><a href="soms.html">Home</a></li>
        <li><a href="products.html">Products</a></li>
        <li><a href="about.html">About</a></li>

    </ul>

</nav>
<section>
    <form>

        <table>
            <tr>
                <td></td>
                <td><h2>Register</h2></td>
            </tr>

            <tr>
                <td>Name :</td>
                <td><input placeholder="Enter username" required type="text"></td>
            </tr>

            <tr>
                <td>Email :</td>
                <td><input placeholder="Enter email" type="email"></td>
            </tr>
            <tr>
                <td>Contact :</td>
                <td><input placeholder="Enter contact" type="text"></td>
            </tr>

            <tr>
                <td>Dob :</td>
                <td><input type="date"></td>
            </tr>

            <tr>
                <td>Password :</td>
                <td><input placeholder="Enter password" required type="password"></td>
            </tr>
            <tr>
                <td>Confirm Password :</td>
                <td><input placeholder="Re Enter password" required type="password"></td>
            </tr>

            <tr>
                <td>Address</td>
                <td><textarea></textarea></td>
            </tr>
            <tr>
                <td>UserType</td>
                <td>
                    <select>
                        <option>Seller</option>
                        <option>Buyer</option>

                    </select>
                </td>
            </tr>

            <tr>
                <td></td>
                <td><input type="submit"></td>
            </tr>
            <tr>
                <td></td>
                <td>Already have an account? <a href="soms.html">Login</a></td>
            </tr>
        </table>

    </form>
</section>
